name: Build Bazel
description: Composite action for Bazel build and test

inputs:
  targets:
    description: Bazel targets to build and test (e.g. //...)
    required: false
    default: //...

runs:
  using: composite
  steps:
    - name: Set up Bazelisk
      uses: bazelbuild/setup-bazelisk@v3

    - name: Build
      shell: bash
      run: bazel build --config=ci ${{ inputs.targets }}

    - name: Test
      shell: bash
      run: bazel test --config=ci ${{ inputs.targets }}
