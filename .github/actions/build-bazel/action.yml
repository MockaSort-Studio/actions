name: Build Bazel
description: Composite action for Bazel build and test

inputs:
  targets:
    description: Bazel targets to build and test (e.g. //...)
    required: false
    default: //...
  bazel-cache:
    description: Remote cache URL for Bazel (optional)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Bazelisk
      uses: bazelbuild/setup-bazelisk@v3

    - name: Build
      shell: bash
      run: |
        CACHE_FLAG=""
        if [[ -n "${{ inputs.bazel-cache }}" ]]; then
          CACHE_FLAG="--remote_cache=${{ inputs.bazel-cache }}"
        fi
        bazel build $CACHE_FLAG ${{ inputs.targets }}

    - name: Test
      shell: bash
      run: |
        CACHE_FLAG=""
        if [[ -n "${{ inputs.bazel-cache }}" ]]; then
          CACHE_FLAG="--remote_cache=${{ inputs.bazel-cache }}"
        fi
        bazel test $CACHE_FLAG ${{ inputs.targets }}
