name: Lint Check
description: Run shellcheck, ruff, yamllint, and actionlint

inputs:
  working-directory:
    description: Directory to lint (defaults to repo root)
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: ruff check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv run ruff check .

    - name: yamllint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: yamllint .

    - name: shellcheck
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        find . -name "*.sh" -print0 | xargs -0 --no-run-if-empty shellcheck

    - name: actionlint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: actionlint
