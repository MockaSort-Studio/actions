name: PR Comment — Trigger Finish Checks
description: |
  Close a check run created by pr-comment-trigger/start.
  Designed to run with `if: always()`.
  For posting result comments, use peter-evans/create-or-update-comment directly.

inputs:
  check-run-id:
    description: ID of the check run to update (from pr-comment-trigger outputs)
    required: true
  status:
    description: Job result — pass `needs.<job>.result` (success, failure, cancelled, skipped)
    required: true
  success-title:
    description: Check run output title on success
    required: false
    default: "Completed"
  success-summary:
    description: Check run output summary on success
    required: false
    default: ""
  failure-title:
    description: Check run output title on failure or cancellation
    required: false
    default: "Failed"
  failure-summary:
    description: Check run output summary on failure or cancellation
    required: false
    default: ""
  token:
    description: GitHub token with checks:write
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Update check run
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token || github.token }}
        script: |
          const status = '${{ inputs.status }}';
          const isSuccess = status === 'success';
          const checkRunId = parseInt('${{ inputs.check-run-id }}', 10);
          if (!checkRunId) {
            core.warning('No check-run-id provided — skipping check update');
            return;
          }
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          await github.rest.checks.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            check_run_id: checkRunId,
            status: 'completed',
            conclusion: isSuccess ? 'success' : (status === 'cancelled' ? 'cancelled' : 'failure'),
            completed_at: new Date().toISOString(),
            output: {
              title: isSuccess ? '${{ inputs.success-title }}' : '${{ inputs.failure-title }}',
              summary: (isSuccess ? '${{ inputs.success-summary }}' : '${{ inputs.failure-summary }}')
                || `**Status**: ${status}` + `\n\n[View logs](${runUrl})`
            }
          });
