name: Test uv
description: Run pytest from source using uv (no build, no artifact)

inputs:
  python-version:
    description: Python version to use (reads .python-version if omitted)
    required: false
    default: ""
  test-args:
    description: Extra arguments passed to pytest
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync --frozen

    - name: Test
      shell: bash
      run: uv run pytest ${{ inputs.test-args }}
