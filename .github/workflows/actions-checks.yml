name: MockaSort Actions PR Checks

on:
  issue_comment:
    types: [created]

permissions:
  checks: write
  contents: read
  packages: write
  pull-requests: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      triggered: ${{ steps.trigger.outputs.triggered }}
      head-sha: ${{ steps.trigger.outputs.head-sha }}
      check-run-id: ${{ steps.trigger.outputs.check-run-id }}
      run-python: ${{ steps.python-filter.outputs.matched }}
      run-container: ${{ steps.container-filter.outputs.matched }}
      run-changes-filter: ${{ steps.changes-filter-filter.outputs.matched }}
      run-bazel: ${{ steps.bazel-filter.outputs.matched }}
      run-lint-python: ${{ steps.lint-python-filter.outputs.matched }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pr-comment-trigger-start-checks
        id: trigger
        with:
          trigger-phrase: ":pig_nose:"
          check-name: pr-checks
          ack-comment: ":boar: Sgrufoling...oink oink!"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch changed files
        id: changes
        if: steps.trigger.outputs.triggered == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number
            });
            return JSON.stringify(files.map(f => f.filename));

      - uses: ./.github/actions/changes-filter
        id: python-filter
        if: steps.trigger.outputs.triggered == 'true'
        with:
          changed-files: ${{ steps.changes.outputs.result }}
          paths: |
            .github/actions/test-uv/
            .github/actions/smoke-test-uv/
            .github/actions/generate-coverage/
            .github/workflows/release-python.yml
            .github/workflows/python-coverage.yml
            .github/workflows/test-python-pipeline.yml

      - uses: ./.github/actions/changes-filter
        id: container-filter
        if: steps.trigger.outputs.triggered == 'true'
        with:
          changed-files: ${{ steps.changes.outputs.result }}
          paths: |
            .github/actions/push-container/
            .github/workflows/release-container.yml
            .github/workflows/test-release-container.yml
            Dockerfile

      - uses: ./.github/actions/changes-filter
        id: changes-filter-filter
        if: steps.trigger.outputs.triggered == 'true'
        with:
          changed-files: ${{ steps.changes.outputs.result }}
          paths: |
            .github/actions/changes-filter/
            .github/workflows/test-changes-filter.yml

      - uses: ./.github/actions/changes-filter
        id: bazel-filter
        with:
          changed-files: ${{ steps.changes.outputs.result }}
          paths: |
            .github/actions/build-bazel/
            .github/workflows/bazel-pipeline.yml
            .github/workflows/test-bazel-pipeline.yml
            tests/fixtures/bazel-workspace/
      - uses: ./.github/actions/changes-filter
        id: lint-python-filter
        if: steps.trigger.outputs.triggered == 'true'
        with:
          changed-files: ${{ steps.changes.outputs.result }}
          paths: |
            .github/workflows/lint-python.yml

  test-python:
    needs: setup
    if: needs.setup.outputs.triggered == 'true' && needs.setup.outputs.run-python == 'true'
    uses: ./.github/workflows/test-python-pipeline.yml

  test-container:
    needs: setup
    if: needs.setup.outputs.triggered == 'true' && needs.setup.outputs.run-container == 'true'
    uses: ./.github/workflows/test-release-container.yml
    secrets: inherit

  test-changes-filter:
    needs: setup
    if: needs.setup.outputs.triggered == 'true' && needs.setup.outputs.run-changes-filter == 'true'
    uses: ./.github/workflows/test-changes-filter.yml

  test-bazel:
    needs: setup
    if: needs.setup.outputs.triggered == 'true' && needs.setup.outputs.run-bazel == 'true'
    uses: ./.github/workflows/test-bazel-pipeline.yml
    
  test-lint-python:
    needs: setup
    if: needs.setup.outputs.triggered == 'true' && needs.setup.outputs.run-lint-python == 'true'
    uses: ./.github/workflows/lint-python.yml
    with:
      working-directory: tests/fixtures/sample-package

  finish:
    needs: [setup, test-python, test-container, test-changes-filter, test-bazel, test-lint-python]
    if: always() && needs.setup.outputs.triggered == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve overall status
        id: status
        shell: bash
        run: |
          PYTHON="${{ needs.test-python.result }}"
          CONTAINER="${{ needs.test-container.result }}"
          CHANGES_FILTER="${{ needs.test-changes-filter.result }}"
          BAZEL="${{ needs.test-bazel.result }}"
          LINT_PYTHON="${{ needs.test-lint-python.result }}"
          if [[ "$PYTHON" == "failure" || "$PYTHON" == "cancelled" || \
                "$CONTAINER" == "failure" || "$CONTAINER" == "cancelled" || \
                "$CHANGES_FILTER" == "failure" || "$CHANGES_FILTER" == "cancelled" || \
                "$LINT_PYTHON" == "failure" || "$LINT_PYTHON" == "cancelled" ]] \
                "$BAZEL" == "failure" || "$BAZEL" == "cancelled" ]]; then
            echo "value=failure" >> "$GITHUB_OUTPUT"
          else
            echo "value=success" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pr-comment-trigger-finish-checks
        with:
          check-run-id: ${{ needs.setup.outputs.check-run-id }}
          status: ${{ steps.status.outputs.value }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: peter-evans/create-or-update-comment@v5
        if: steps.status.outputs.value == 'success'
        with:
          issue-number: ${{ github.event.issue.number }}
          body: ":white_check_mark: All relevant tests passed."

      - uses: peter-evans/create-or-update-comment@v5
        if: steps.status.outputs.value == 'failure'
        with:
          issue-number: ${{ github.event.issue.number }}
          body: ":x: Some tests failed. Check the [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
