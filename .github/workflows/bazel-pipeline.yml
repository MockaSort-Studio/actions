# Reusable Bazel build-and-test pipeline.
#
# Assumes the calling repository has a `.bazelrc` with a `build:ci` config
# that sets up remote execution and caching (e.g. BuildBuddy RBE). Cache
# authentication is handled via the BUILD_BUDDY_KEY environment variable,
# which this workflow sources from the calling repo's BUILD_BUDDY_KEY secret.
# Example .bazelrc entry:
#   build:ci --remote_cache=grpcs://remote.buildbuddy.io
#   build:ci --remote_header=x-buildbuddy-api-key=$BUILD_BUDDY_KEY
name: Bazel Pipeline

on:
  workflow_call:
    inputs:
      targets:
        description: Bazel targets to build and test
        type: string
        required: false
        default: "//..."

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/build-bazel
        with:
          targets: ${{ inputs.targets }}
          build_buddy_key: ${{ secrets.BUILD_BUDDY_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
