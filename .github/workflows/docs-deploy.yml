name: Deploy Docs

on:
  workflow_call:
    inputs:
      doc-tool:
        description: >
          Documentation tool package to install.
          Supported: mkdocs-material, zensical.
          Both expose the mkdocs CLI — only the installed package differs.
        type: string
        required: false
        default: mkdocs-material
      python-version:
        description: Python version to use (reads .python-version if omitted)
        type: string
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true

      - name: Install doc tool
        run: uv tool install ${{ inputs.doc-tool }}

      - name: Build docs
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
