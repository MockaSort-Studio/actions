name: Deploy Zensical Docs

on:
  workflow_call:
    inputs:
      config-file:
        description: Path to the Zensical config file (e.g. zensical.toml)
        type: string
        required: false
        default: zensical.toml
      python-version:
        description: Python version to use (reads .python-version if omitted)
        type: string
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true

      - name: Build docs
        run: uvx zensical build -f ${{ inputs.config-file }}

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
