name: Release Container
#I'm a change to trigger test on me
on:
  workflow_call:
    inputs:
      image-name:
        description: Image name without registry (defaults to github.repository)
        type: string
        required: false
        default: ""
      tags:
        description: |
          Explicit image tags (one per line, full registry path).
          If omitted, tags are auto-generated from git context.
        type: string
        required: false
        default: ""
      labels:
        description: Additional OCI labels (one per line, KEY=VALUE)
        type: string
        required: false
        default: ""
      image-description:
        description: OCI org.opencontainers.image.description label value
        type: string
        required: false
        default: ""
      dockerfile:
        description: Path to the Dockerfile
        type: string
        required: false
        default: Dockerfile
      context:
        description: Docker build context path
        type: string
        required: false
        default: .
    secrets:
      token:
        description: GitHub token for GHCR authentication
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/push-container
        with:
          image-name: ${{ inputs.image-name }}
          tags: ${{ inputs.tags }}
          labels: ${{ inputs.labels }}
          image-description: ${{ inputs.image-description }}
          dockerfile: ${{ inputs.dockerfile }}
          context: ${{ inputs.context }}
          token: ${{ secrets.token || secrets.GITHUB_TOKEN }}
