name: Test — Changes-Filter

on:
  workflow_call:

jobs:
  test-paths-match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/changes-filter
        id: filter
        with:
          changed-files: '[".github/workflows/release-python.yml", "src/foo.py"]'
          paths: |
            .github/workflows/release-python.yml
      - name: Assert matched=true
        shell: bash
        run: |
          [ "${{ steps.filter.outputs.matched }}" = "true" ] || {
            echo "expected matched=true, got: ${{ steps.filter.outputs.matched }}"
            exit 1
          }

  test-paths-no-match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/changes-filter
        id: filter
        with:
          changed-files: '[".github/workflows/release-python.yml", "src/foo.py"]'
          paths: |
            Dockerfile
            .github/actions/push-container/
      - name: Assert matched=false
        shell: bash
        run: |
          [ "${{ steps.filter.outputs.matched }}" = "false" ] || {
            echo "expected matched=false, got: ${{ steps.filter.outputs.matched }}"
            exit 1
          }

  test-paths-glob-wildcard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/changes-filter
        id: filter
        with:
          changed-files: '["src/lib/utils.py", "src/models/user.py"]'
          paths: |
            src/**/*.py
      - name: Assert matched=true
        shell: bash
        run: |
          [ "${{ steps.filter.outputs.matched }}" = "true" ] || {
            echo "expected matched=true, got: ${{ steps.filter.outputs.matched }}"
            exit 1
          }

  test-paths-folder-prefix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/changes-filter
        id: filter
        with:
          changed-files: '[".github/actions/test-uv/action.yml"]'
          paths: |
            .github/actions/test-uv/
      - name: Assert matched=true
        shell: bash
        run: |
          [ "${{ steps.filter.outputs.matched }}" = "true" ] || {
            echo "expected matched=true, got: ${{ steps.filter.outputs.matched }}"
            exit 1
          }

  test-script-match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/changes-filter
        id: filter
        with:
          changed-files: '["src/foo.py"]'
          filter-script: |
            echo "$CHANGED_FILES" | grep -q "src/"
      - name: Assert matched=true
        shell: bash
        run: |
          [ "${{ steps.filter.outputs.matched }}" = "true" ] || {
            echo "expected matched=true, got: ${{ steps.filter.outputs.matched }}"
            exit 1
          }

  test-script-no-match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/changes-filter
        id: filter
        with:
          changed-files: '["src/foo.py"]'
          filter-script: |
            echo "$CHANGED_FILES" | grep -q "Dockerfile"
      - name: Assert matched=false
        shell: bash
        run: |
          [ "${{ steps.filter.outputs.matched }}" = "false" ] || {
            echo "expected matched=false, got: ${{ steps.filter.outputs.matched }}"
            exit 1
          }

  test-matched-files-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/changes-filter
        id: filter
        with:
          changed-files: '["src/lib/utils.py", "src/models/user.py", "docs/index.md"]'
          paths: |
            src/**/*.py
      - name: Assert matched=true and matched-files contains only py files
        shell: bash
        run: |
          [ "${{ steps.filter.outputs.matched }}" = "true" ] || {
            echo "expected matched=true, got: ${{ steps.filter.outputs.matched }}"
            exit 1
          }
          echo '${{ steps.filter.outputs.matched-files }}' | python3 -c "
          import sys, json
          files = json.load(sys.stdin)
          assert 'src/lib/utils.py' in files, f'missing utils.py: {files}'
          assert 'src/models/user.py' in files, f'missing user.py: {files}'
          assert 'docs/index.md' not in files, f'docs/index.md should not match: {files}'
          print('matched-files OK:', files)
          "
