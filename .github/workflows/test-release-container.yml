name: Test — Release-Container

# Smoke test for the release-container reusable workflow.
# Pushes a real dummy image to GHCR, then cleans up old versions.
#
# NOTE: requires the repo to be published on GitHub, as the workflow
# references composite actions by their full org/repo path.

on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/release-container.yml
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    with:
      image-name: mockasort-studio/actions
      image-description: Smoke test image — safe to delete

  cleanup:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      packages: write
    steps:
      - name: Delete old test image versions
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          owner: mockasort-studio
          package-name: actions
          package-type: container
          min-versions-to-keep: 1
          token: ${{ secrets.GITHUB_TOKEN }}
